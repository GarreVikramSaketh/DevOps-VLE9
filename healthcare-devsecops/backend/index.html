<!DOCTYPE html>
<html>
<head>
  <title>Patient Health Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e6f0ff, #ffffff);
      margin: 0;
      padding: 0;
    }

    .header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h3 {
      text-align: center;
      color: #007bff;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0056b3;
    }

    .output {
      margin: 40px auto;
      width: 60%;
      background: black;
      color: #00ffcc;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
    }
  </style>
</head>

<body>

  <div class="header">🏥 Patient Health Portal (Secure DevSecOps)</div>

  <div class="container">

    <!-- Register -->
    <div class="card">
      <h3>Patient Registration</h3>
      <input id="regEmail" placeholder="Enter Email">
      <input id="regPass" type="password" placeholder="Enter Password">
      <button onclick="register()">Register</button>
    </div>

    <!-- Login -->
    <div class="card">
      <h3>Patient Login</h3>
      <input id="logEmail" placeholder="Enter Email">
      <input id="logPass" type="password" placeholder="Enter Password">
      <button onclick="login()">Login</button>
    </div>

  </div>

  <div class="output" id="output">Output will appear here...</div>

<script>
const BASE_URL = "http://localhost:8000";

async function register() {
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPass").value;

  const res = await fetch(BASE_URL + "/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

async function login() {
  const email = document.getElementById("logEmail").value;
  const password = document.getElementById("logPass").value;

  const res = await fetch(BASE_URL + "/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
