<!DOCTYPE html>
<html>
<head>
  <title>Patient Health Portal</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f8fb;
    }

    .header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .dashboard {
      display: none;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
  </style>
</head>

<body>

<div class="header">🏥 Patient Health Portal</div>

<!-- LOGIN/REGISTER -->
<div id="authSection" class="container">
  <div class="card">
    <h3>Register</h3>
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>

    <h3>Login</h3>
    <input id="logEmail" placeholder="Email">
    <input id="logPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <h2>Welcome to Patient Dashboard</h2>

  <div class="box">
    <h3>User Info</h3>
    <p id="userEmail"></p>
  </div>

  <div class="box">
    <h3>JWT Token</h3>
    <p id="token"></p>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
const BASE_URL = "http://localhost:8000";

async function register() {
  const email = regEmail.value;
  const password = regPass.value;

  const res = await fetch(BASE_URL + "/api/auth/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  });

  alert("Registered Successfully");
}

async function login() {
  const email = logEmail.value;
  const password = logPass.value;

  const res = await fetch(BASE_URL + "/api/auth/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    localStorage.setItem("email", email);

    document.getElementById("authSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("userEmail").innerText = email;
    document.getElementById("token").innerText = data.token;
  } else {
    alert("Login failed");
  }
}

function logout(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
